<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <style>
      :root {
        --bg: #101820;
        --surface: rgba(255, 255, 255, 0.08);
        --surface-strong: rgba(255, 255, 255, 0.14);
        --line: rgba(255, 255, 255, 0.14);
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.66);
        --accent: #e8b16a;
        --accent-dark: #b8792d;
        --shadow: 0 26px 80px rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 22% 20%, rgba(232, 177, 106, 0.2), transparent 28%),
          radial-gradient(circle at 82% 12%, rgba(119, 145, 164, 0.2), transparent 28%),
          linear-gradient(135deg, #0b1117, #17232d 52%, #0c1218);
      }

      .layout {
        width: min(100%, 980px);
        display: grid;
        grid-template-columns: 0.92fr 1fr;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 34px;
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(22px);
      }

      .panel {
        min-height: 620px;
        padding: 42px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
          url("assets/amero-hero.png") center / cover;
        position: relative;
      }

      .panel::before {
        position: absolute;
        inset: 0;
        content: "";
        background: linear-gradient(180deg, rgba(8, 13, 18, 0.28), rgba(8, 13, 18, 0.78));
      }

      .panel > * {
        position: relative;
      }

      .brand {
        font-size: 28px;
        font-weight: 850;
      }

      .panel h2 {
        max-width: 340px;
        margin: 0;
        font-size: 42px;
        line-height: 1.04;
      }

      .panel p {
        max-width: 330px;
        margin: 18px 0 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .form-side {
        padding: 50px;
        background: rgba(13, 20, 27, 0.62);
      }

      h1 {
        margin: 0;
        font-size: 36px;
        line-height: 1.1;
      }

      .subtitle {
        margin: 12px 0 30px;
        color: var(--muted);
        line-height: 1.6;
      }

      form {
        display: grid;
        gap: 16px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 8px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 13px;
        font-weight: 650;
      }

      input,
      select {
        width: 100%;
        height: 52px;
        padding: 0 15px;
        border: 1px solid var(--line);
        border-radius: 15px;
        color: var(--text);
        background: var(--surface-strong);
        font: inherit;
        outline: none;
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.36);
      }

      input:focus,
      select:focus {
        border-color: rgba(232, 177, 106, 0.78);
        box-shadow: 0 0 0 4px rgba(232, 177, 106, 0.12);
      }

      select {
        color: rgba(255, 255, 255, 0.72);
      }

      button {
        height: 55px;
        margin-top: 8px;
        border: 0;
        border-radius: 999px;
        color: #14191f;
        background: linear-gradient(135deg, var(--accent), #f3d8a6);
        box-shadow: 0 18px 42px rgba(232, 177, 106, 0.22);
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .fine-print {
        margin: 20px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .fine-print a {
        color: #fff;
        font-weight: 750;
        text-decoration: none;
      }

      @media (max-width: 820px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .panel {
          min-height: 300px;
        }
      }

      @media (max-width: 540px) {
        .panel,
        .form-side {
          padding: 30px 22px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .panel h2,
        h1 {
          font-size: 31px;
        }
      }
    </style>
  </head>
  <body>
    <main class="layout" aria-labelledby="signup-title">
      <section class="panel" aria-label="Brand introduction">
        <div class="brand">Amero</div>
        <div>
          <h2>Start planning your modular home.</h2>
          <p>Save layouts, compare finishes, and organize every decision in one refined workspace.</p>
        </div>
      </section>

      <section class="form-side">
        <h1 id="signup-title">Create account</h1>
        <p class="subtitle">Tell us a little about yourself to set up your project dashboard.</p>

        <form>
          <div class="grid">
            <label>
              First name
              <input type="text" placeholder="Rishabh" />
            </label>
            <label>
              Last name
              <input type="text" placeholder="Raghav" />
            </label>
          </div>

          <label>
            Email address
            <input type="email" placeholder="you@example.com" />
          </label>

          <label>
            Project type
            <select>
              <option>Private residence</option>
              <option>Vacation home</option>
              <option>Hospitality project</option>
            </select>
          </label>

          <label>
            Password
            <input type="password" placeholder="Create a password" />
          </label>

          <button type="button">Sign up</button>
        </form>

        <p class="fine-print">
          Already have an account? <a href="../login/index.html">Log in</a>
        </p>
      </section>
    </main>
    <script type="module" src="../app.js"></script>
  </body>
</html>

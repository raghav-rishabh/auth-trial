<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      :root {
        --bg: #eef2f6;
        --surface: #ffffff;
        --ink: #17202a;
        --muted: #6f7a86;
        --line: #dde5ed;
        --primary: #111827;
        --primary-soft: #263241;
        --accent: #6c8cff;
        --shadow: 0 24px 70px rgba(24, 34, 48, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 20% 15%, rgba(108, 140, 255, 0.18), transparent 30%),
          radial-gradient(circle at 78% 72%, rgba(23, 32, 42, 0.1), transparent 28%),
          var(--bg);
      }

      .card {
        width: min(100%, 440px);
        padding: 42px;
        border: 1px solid rgba(255, 255, 255, 0.74);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 36px;
        font-weight: 800;
        font-size: 24px;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 15px;
        color: #fff;
        background: linear-gradient(135deg, var(--primary), var(--accent));
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.08;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 12px 0 30px;
        color: var(--muted);
        line-height: 1.6;
      }

      form {
        display: grid;
        gap: 18px;
      }

      label {
        display: grid;
        gap: 8px;
        color: #344150;
        font-size: 14px;
        font-weight: 650;
      }

      input {
        width: 100%;
        height: 52px;
        padding: 0 16px;
        border: 1px solid var(--line);
        border-radius: 16px;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.88);
        font: inherit;
        outline: none;
        transition: border-color 180ms ease, box-shadow 180ms ease;
      }

      input:focus {
        border-color: rgba(108, 140, 255, 0.8);
        box-shadow: 0 0 0 4px rgba(108, 140, 255, 0.14);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin: 2px 0 8px;
        color: var(--muted);
        font-size: 14px;
      }

      .check {
        display: flex;
        align-items: center;
        gap: 9px;
      }

      .check input {
        width: 16px;
        height: 16px;
        accent-color: var(--primary);
      }

      a {
        color: var(--primary);
        font-weight: 700;
        text-decoration: none;
      }

      button {
        height: 54px;
        border: 0;
        border-radius: 17px;
        color: #fff;
        background: linear-gradient(135deg, var(--primary), var(--primary-soft));
        box-shadow: 0 16px 30px rgba(17, 24, 39, 0.22);
        font: inherit;
        font-weight: 750;
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 40px rgba(17, 24, 39, 0.28);
      }

      .footer {
        margin: 26px 0 0;
        color: var(--muted);
        text-align: center;
        font-size: 14px;
      }

      @media (max-width: 520px) {
        .card {
          padding: 30px 22px;
          border-radius: 24px;
        }

        h1 {
          font-size: 29px;
        }

        .row {
          align-items: flex-start;
          flex-direction: column;
          gap: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card" aria-labelledby="login-title">
      <div class="brand">
        <div class="brand-mark">A</div>
        Amero
      </div>

      <h1 id="login-title">Welcome back</h1>
      <p class="subtitle">Log in to manage your projects, catalog saves, and modular home dashboard.</p>

      <form>
        <label>
          Email address
          <input type="email" placeholder="you@example.com" />
        </label>

        <label>
          Password
          <input type="password" placeholder="Enter your password" />
        </label>

        <div class="row">
          <label class="check">
            <input type="checkbox" />
            Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="button">Log in</button>
      </form>

      <p class="footer">New here? <a href="../signup/index.html">Create an account</a></p>
    </main>
    <script type="module" src="../app.js"></script>
  </body>
</html>
